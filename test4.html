<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test odsłuchowy — A/B porównanie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link id="theme-css" rel="stylesheet" href="css/theme-neutral.css">
  <script>
    // Motyw jasny/ciemny: podmiana arkusza (oba mają ten sam kontrakt zmiennych).
    // Domyślnie wg prefers-color-scheme, wybór zapamiętany w localStorage.
    (function () {
      var THEMES = { light: 'css/theme-neutral.css', dark: 'css/theme-demo.css' };
      var saved = null;
      try { saved = localStorage.getItem('ab-theme'); } catch (e) {}
      var mode = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.getElementById('theme-css').href = THEMES[mode];
      document.documentElement.setAttribute('data-theme', mode);
      window.__toggleTheme = function () {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.getElementById('theme-css').href = THEMES[next];
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('ab-theme', next); } catch (e) {}
        var b = document.getElementById('theme-toggle');
        if (b) b.textContent = next === 'dark' ? '☀︎ Jasny' : '☾ Ciemny';
      };
    })();
  </script>
  <style>
    .paired-players { display: flex; gap: 2rem; margin: 2rem 0; flex-wrap: wrap; }
    .player-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 0.5rem; }
    .player-label { font-weight: 500; font-size: 0.9rem; }
    .player-group audio { width: 100%; }
    #theme-toggle {
      position: fixed; top: 0.75rem; right: 0.75rem; z-index: 100;
      font-family: inherit; font-size: 0.8rem; padding: 0.4rem 0.7rem;
      background: var(--surface, #fff); color: var(--text, #000);
      border: 1px solid var(--border, #ccc); border-radius: 6px; cursor: pointer; opacity: 0.85;
    }
    #theme-toggle:hover { opacity: 1; }
  </style>
</head>
<body>
  <button id="theme-toggle" type="button" onclick="__toggleTheme()">☾ Ciemny</button>
  <main id="app"></main>
  <script>
    (function () {
      var m = document.documentElement.getAttribute('data-theme');
      var b = document.getElementById('theme-toggle');
      if (b) b.textContent = m === 'dark' ? '☀︎ Jasny' : '☾ Ciemny';
    })();
  </script>
  <script type="module" src="js/app-paired.js"></script>
</body>
</html>
